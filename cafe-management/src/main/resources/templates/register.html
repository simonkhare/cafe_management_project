<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Customer Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1200') no-repeat center center fixed;
            background-size: cover;
        }
        .card { background: rgba(255, 255, 255, 0.95); border-radius: 12px; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow">
                <h3 class="fw-bold text-center mb-3">Join The Aroma Cafe</h3>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/register}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Choose Username</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mb-3">Sign Up & Register</button>
                </form>
                <div class="text-center">
                    <a th:href="@{/login/customer}" class="text-decoration-none text-muted small">Already have an account? Log in here</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
