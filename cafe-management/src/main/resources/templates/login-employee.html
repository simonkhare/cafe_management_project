<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Cafe Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #2b2d42;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .btn-dark-custom {
            background-color: #d90429;
            color: white;
        }
        .btn-dark-custom:hover {
            background-color: #b30322;
        }
    </style>
</head>
<body class="d-flex align-items-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">🔒 Staff Dashboard Login</h3>
                    <p class="text-muted">Enter administrative credentials</p>
                </div>

                <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                <form th:action="@{/login}" method="POST">
                    <input type="hidden" name="expectedRole" value="EMPLOYEE">

                    <div class="mb-3">
                        <label for="username" class="form-label">Employee ID / Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-dark-custom w-100 py-2 mb-3 fw-bold">Authenticate Staff</button>
                </form>

                <div class="text-center">
                    <a th:href="@{/login/customer}" class="text-decoration-none text-muted small">← Back to Customer Interface</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
