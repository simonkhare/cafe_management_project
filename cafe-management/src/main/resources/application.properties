spring.application.name=cafe-management

# 1. MySQL Database Connection Settings
# Change 'cafe_db' to whatever name you want for your database
spring.datasource.url=jdbc:mysql://localhost:3306/cafe_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate/JPA Configuration for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 'update' automatically creates tables or modifies them based on your User.java entity
spring.jpa.hibernate.ddl-auto=update

# Prints SQL queries to the console so you can see what Spring Boot is executing
spring.jpa.show-sql=true